<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up / Login</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <main class="container">
    <div class="tabs">
      <button type="button" class="tab-button active" onclick="showTab('login')">Login</button>
      <button type="button" class="tab-button" onclick="showTab('signup')">Sign Up</button>
    </div>

    <section id="login" class="tab-content active" aria-labelledby="login-title">
      <h2 id="login-title">Login</h2>
      <form>
        <label for="login-email">Email:</label>
        <input type="email" id="login-email" autocomplete="email" required>

        <label for="login-password">Password:</label>
        <input type="password" id="login-password" autocomplete="current-password" required>

        <label class="remember-me">
          <input type="checkbox" id="remember-me">
          Remember me
        </label>

        <button type="submit">Login</button>
      </form>
    </section>

    <section id="signup" class="tab-content" aria-labelledby="signup-title">
      <h2 id="signup-title">Sign Up</h2>
      <form>
        <label for="signup-name">Name:</label>
        <input type="text" id="signup-name" autocomplete="name" required>

        <label for="signup-email">Email:</label>
        <input type="email" id="signup-email" autocomplete="email" required>

        <label for="signup-password">Password:</label>
        <input type="password" id="signup-password" autocomplete="new-password" required>

        <label for="signup-confirm-password">Confirm Password:</label>
        <input type="password" id="signup-confirm-password" autocomplete="new-password" required>

        <label>
          <input type="checkbox" id="enable-2fa">
          Enable Two-Factor Authentication (2FA)
        </label>

        <button type="submit">Sign Up</button>
      </form>
    </section>
  </main>

  <div id="twofactor-overlay" class="twofactor-overlay" style="display: none;">
    <div class="twofactor-modal" role="dialog" aria-modal="true" aria-labelledby="twofactor-title">
      <h2 id="twofactor-title">Two-Factor Authentication</h2>
      <p>Enter the 6-digit code sent to your email</p>
      <input type="text" id="overlay-verification-code" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      <button type="button" id="overlay-verify-button">Verify</button>
      <button type="button" id="overlay-cancel-button">Cancel</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../shared/theme.js" defer></script>
  <script src="signup.js"></script>
</body>
</html>
